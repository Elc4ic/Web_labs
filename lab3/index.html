<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Визуализация данных D3</title>
    <link rel="stylesheet" href="CSS/style.css">
    <script src="d3.v7.min.js"></script>
    <script src="JavaScript/data.js"></script>
    <script src="JavaScript/table.js"></script>
    <script src="JavaScript/chart.js"></script>
    <script src="JavaScript/main.js" defer></script>
</head>
<body>
<h3>Список самых высоких зданий</h3>

<fieldset class="graph-settings">
    <legend>Настройки графика</legend>

    <div>
        <strong>Значение по оси ОХ:</strong><br>
        <label><input type="radio" name="xAxis" value="Страна" checked> Страна</label>
        <label><input type="radio" name="xAxis" value="Год"> Год</label>
    </div>

    <div>
        <strong>Значение по оси ОУ:</strong><br>
        <label><input type="checkbox" id="yMax" checked> Максимальная высота</label>
        <label><input type="checkbox" id="yMin"> Минимальная высота</label>
    </div>

    <div>
        <strong>Тип графика:</strong>
        <select id="chartType">
            <option value="scatter">Точечная диаграмма</option>
            <option value="bar">Гистограмма</option>
        </select>
    </div>

</fieldset>

<svg id="graph"></svg>

<br>
<button id="btn-toggle-table">Скрыть таблицу</button>
<table id="build"></table>
</body>
</html>
