<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Фильтры и сортировка</title>
    <link rel="stylesheet" href="CSS/style.css">
    <script src="JavaScript/data.js"></script>
    <script src="JavaScript/table.js"></script>
    <script src="JavaScript/filter.js"></script>
    <script src="JavaScript/sort.js"></script>
    <script src="JavaScript/main.js"></script>
</head>
<body>
<div class="container">
    <aside class="sidebar">
        <h2>Фильтрация</h2>
        <form id="filter">
            <div class="form-group">
                <label for="structure">Название:</label>
                <input type="text" id="structure">
            </div>
            <div class="form-group">
                <label for="category">Тип:</label>
                <input type="text" id="category">
            </div>
            <div class="form-group">
                <label for="country">Страна:</label>
                <input type="text" id="country">
            </div>
            <div class="form-group">
                <label for="city">Город:</label>
                <input type="text" id="city">
            </div>
            <div class="form-group row">
                <label>Год:</label>
                <input type="number" id="yearFrom" placeholder="от">
                <input type="number" id="yearTo" placeholder="до">
            </div>
            <div class="form-group row">
                <label>Высота:</label>
                <input type="number" id="heightFrom" placeholder="от">
                <input type="number" id="heightTo" placeholder="до">
            </div>
            <div class="buttons">
                <input id="find" type="button" class="btn-primary" value="Найти">
                <input id="clearFilter" type="button" class="btn-secondary" value="Очистить фильтры">
            </div>
        </form>

        <hr>

        <h2>Сортировка</h2>
        <form id="sort">
            <div class="form-group">
                <label>Первый уровень:</label>
                <select id="sort1">
                    <option value="none">Нет</option>
                    <option value="Название">Название</option>
                    <option value="Тип">Тип</option>
                    <option value="Страна">Страна</option>
                    <option value="Город">Город</option>
                    <option value="Год">Год</option>
                    <option value="Высота">Высота</option>
                </select>
                <label class="checkbox-label"><input type="checkbox" id="desc1"> По убыванию</label>
            </div>
            <div class="form-group">
                <label>Второй уровень:</label>
                <select id="sort2">
                    <option value="none">Нет</option>
                    <option value="Название">Название</option>
                    <option value="Тип">Тип</option>
                    <option value="Страна">Страна</option>
                    <option value="Город">Город</option>
                    <option value="Год">Год</option>
                    <option value="Высота">Высота</option>
                </select>
                <label class="checkbox-label"><input type="checkbox" id="desc2"> По убыванию</label>
            </div>
            <div class="buttons">
                <input id="doSort" type="button" class="btn-primary" value="Сортировать">
                <input id="clearSort" type="button" class="btn-secondary" value="Сбросить сортировку">
            </div>
        </form>
    </aside>

    <main class="content">
        <table id="list"></table>
    </main>
</div>
</body>
</html>
