<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Лабораторная работа D3</title>
    <script src="d3.v7.min.js"></script>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
<div id="settings-panel">
    <form id="setting">
        <fieldset id="block-start">
            <legend>Начальные параметры</legend>
            <label>x: <input type="number" id="cx" value="300" max="600" min="0"></label><br>
            <label>y: <input type="number" id="cy" value="300" max="600" min="0"></label><br>
            <label>Масштаб X: <input type="number" id="scaleX" value="1" step="0.1"></label><br>
            <label>Масштаб Y: <input type="number" id="scaleY" value="1" step="0.1"></label><br>
            <label>Поворот (град): <input type="number" id="angle" value="0"></label>
        </fieldset>

        <label><input type="checkbox" id="cb-animate"> Включить анимацию?</label><br>
        <label id="label-path" class="hidden"><input type="checkbox" id="cb-path"> Перемещение вдоль пути?</label><br><br>

        <fieldset id="block-finish" class="hidden">
            <legend>Конечные параметры</legend>
            <label>до x: <input type="number" id="cx_finish" value="550"></label><br>
            <label>до y: <input type="number" id="cy_finish" value="550"></label><br>
            <label class="anim-scale-rot">до Масштаб X: <input type="number" id="scaleX_finish" value="1.5"></label><br class="anim-scale-rot">
            <label class="anim-scale-rot">до Масштаб Y: <input type="number" id="scaleY_finish" value="1.5"></label><br class="anim-scale-rot">
            <label class="anim-scale-rot">до Поворот: <input type="number" id="angle_finish" value="180"></label>
        </fieldset>

        <fieldset id="block-f" class="hidden">
            <legend>Измененения перемещения</legend>
            <label class="anim-scale-rotf">до Масштаб X: <input type="number" id="scaleX_f" value="1.5"></label><br class="anim-scale-rot">
            <label class="anim-scale-rotf">до Масштаб Y: <input type="number" id="scaleY_f" value="1.5"></label><br class="anim-scale-rot">
            <label class="anim-scale-rotf">до Поворот: <input type="number" id="angle_f" value="180"></label>
        </fieldset>

        <fieldset id="block-path" class="hidden">
            <legend>Путь перемещения</legend>
            <select id="path-type">
                <option value="0">Буквой "Г"</option>
                <option value="1">По кругу</option>
                <option value="2">Вариант 30 |‾|_|</option>
            </select>
        </fieldset>

        <fieldset id="block-anim-settings" class="hidden">
            <legend>Тип анимации</legend>
            <select id="ease-type">
                <option value="linear">linear</option>
                <option value="elastic">elastic</option>
                <option value="bounce">bounce</option>
            </select>
        </fieldset>

        <input type="button" id="btn-draw" value="Нарисовать">
        <input type="button" id="btn-clear" value="Очистить">
        <input type="button" id="btn-anim" class="hidden" value="Анимировать">
    </form>
</div>

<svg></svg>

<script src="JavaScript/image.js"></script>
<script src="JavaScript/path.js"></script>
<script src="JavaScript/main.js"></script>
</body>
</html>
